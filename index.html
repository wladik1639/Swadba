<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<title>Wedding</title>

<style>
body{
margin:0;
font-family:'Montserrat',sans-serif;
color:white;
scroll-behavior:smooth;
}

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:20px;
}

h1{
font-family:'Playfair Display',serif;
font-size:36px;
}

h2{
font-weight:300;
}

#s1{background-image:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486');}
#s2{background-image:url('https://images.unsplash.com/photo-1505236738415-86c5f60d3b1b');}
#s3{background-image:url('https://images.unsplash.com/photo-1519225421980-715cb0215aed');}
#s4{background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552');}
#s5{background-image:url('https://images.unsplash.com/photo-1473177104440-ffee2f376098');}

.colors{
display:flex;
gap:20px;
margin-top:20px;
}

.color{
width:80px;
height:80px;
border-radius:10px;
}

.black{background:black;border:2px solid white;}
.white{background:white;}

input,select{
padding:12px;
margin:10px;
width:80%;
border-radius:10px;
border:none;
}

button{
padding:15px 25px;
border:none;
border-radius:20px;
background:white;
color:black;
font-size:18px;
}
</style>
</head>

<body onclick="playMusic()">

<section class="section" id="s1">
<div class="overlay">
<h1>Приглашаем на нашу свадьбу</h1>
</div>
</section>

<section class="section" id="s2">
<div class="overlay">
<h1>Место проведения</h1>
<h2>База отдыха на Оке</h2>
</div>
</section>

<section class="section" id="s3">
<div class="overlay">
<h1>Дата и время</h1>
<h2>18 июля 2027</h2>
<h2>15:00</h2>
</div>
</section>

<section class="section" id="s4">
<div class="overlay">
<h1>Дресс-код</h1>
<h2>Черный & Белый</h2>

<div class="colors">
<div class="color black"></div>
<div class="color white"></div>
</div>
</div>
</section>

<section class="section" id="s5">
<div class="overlay">
<h1>Подтвердите участие</h1>

<input placeholder="Имя и фамилия">

<select>
<option>Буду</option>
<option>Не смогу</option>
</select>

<select>
<option>Вино</option>
<option>Виски</option>
<option>Пиво</option>
<option>Шампанское</option>
<option>Не пью</option>
</select>

<button onclick="alert('Спасибо ❤️')">Отправить</button>
</div>
</section>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/27/audio_1c2b77c1f7.mp3">
</audio>

<script>
let started=false;

function playMusic(){
if(!started){
document.getElementById("music").play();
started=true;
}
}
</script>

</body>
</html>
